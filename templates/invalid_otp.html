<!DOCTYPE html>
<html>

<head>

    <title>Invalid OTP</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>

        body{

            margin:0;
            padding:0;

            background:#0f172a;

            font-family:Arial, sans-serif;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .error-box{

            width:450px;

            background:#1e293b;

            padding:40px;

            border-radius:25px;

            text-align:center;

            box-shadow:
            0 0 30px rgba(255,0,0,0.3);
        }

        .icon{

            width:120px;
            height:120px;

            border-radius:50%;

            background:#ef4444;

            color:white;

            display:flex;
            justify-content:center;
            align-items:center;

            margin:auto;

            font-size:60px;
            font-weight:bold;
        }

        h1{

            color:white;

            margin-top:25px;

            font-size:42px;
        }

        p{

            color:#cbd5e1;

            font-size:20px;

            margin-top:20px;

            line-height:1.6;
        }

        .btn{

            display:inline-block;

            margin-top:35px;

            padding:16px 35px;

            background:linear-gradient(
                90deg,
                #f59e0b,
                #ea580c
            );

            color:white;

            text-decoration:none;

            border-radius:15px;

            font-size:20px;
            font-weight:bold;

            transition:0.3s;
        }

        .btn:hover{

            transform:scale(1.05);

            box-shadow:
            0 0 20px rgba(255,165,0,0.5);
        }

    </style>

</head>

<body>

    <div class="error-box">

        <div class="icon">
            !
        </div>

        <h1>Invalid OTP</h1>

        <p>
            The OTP you entered is incorrect.<br><br>

            Please try again using the correct OTP sent to your registered email.
        </p>

        <a href="/verify-email-otp"
           class="btn">

           Try Again

        </a>

    </div>

</body>

</html>
