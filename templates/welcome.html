<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Welcome - Hindalco AI</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            background:#ff3c00;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            text-align:center;

            color:white;

            padding:20px;
        }

        .container{

            width:100%;

            max-width:900px;
        }

        h1{

            font-size:clamp(50px, 10vw, 120px);

            font-weight:bold;

            line-height:1.1;
        }

        .line{

            width:180px;

            height:3px;

            background:white;

            margin:35px auto;
        }

        p{

            font-size:clamp(20px, 3vw, 42px);

            letter-spacing:4px;

            margin-bottom:50px;
        }

        .btn{

            display:inline-block;

            text-decoration:none;

            background:white;

            color:#ff7a00;

            padding:18px 55px;

            border-radius:15px;

            font-size:clamp(22px, 2vw, 36px);

            font-weight:bold;

            transition:0.3s;
        }

        .btn:hover{

            transform:scale(1.05);
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>

            Welcome to <br>

            Hindalco

        </h1>

        <div class="line"></div>

        <p>

            YOUR 24/7 AI ASSISTANT

        </p>

        <a href="/login" class="btn">

            Get Started

        </a>

    </div>

</body>

</html>
